name: quickbite

networks:
  quickbite-net:
    driver: bridge

volumes:
  sqlserver-data:
  rabbitmq-data:

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: quickbite-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - quickbite-net
    healthcheck:
      test: ["CMD-SHELL", "(/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"${MSSQL_SA_PASSWORD}\" -Q 'SELECT 1') || (/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"${MSSQL_SA_PASSWORD}\" -Q 'SELECT 1')"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 45s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: quickbite-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_DEFAULT_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_DEFAULT_PASS}"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - quickbite-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  authservice:
    build:
      context: .
      dockerfile: Services/AuthService/AuthService.API/Dockerfile
    container_name: quickbite-authservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=AuthServiceDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: "${RABBITMQ_DEFAULT_USER}"
      RabbitMq__Password: "${RABBITMQ_DEFAULT_PASS}"
      JwtSettings__Issuer: "${JWT_ISSUER}"
      JwtSettings__Audience: "${JWT_AUDIENCE}"
      JwtSettings__SecretKey: "${JWT_SECRET}"
    ports:
      - "5001:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - quickbite-net
    restart: unless-stopped

  catalogservice:
    build:
      context: .
      dockerfile: Services/CatalogService/CatalogService.API/Dockerfile
    container_name: quickbite-catalogservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__CatalogDb: "Server=sqlserver,1433;Database=CatalogDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: "${RABBITMQ_DEFAULT_USER}"
      RabbitMq__Password: "${RABBITMQ_DEFAULT_PASS}"
      JwtSettings__Issuer: "${JWT_ISSUER}"
      JwtSettings__Audience: "${JWT_AUDIENCE}"
      JwtSettings__SecretKey: "${JWT_SECRET}"
      OrderService__BaseUrl: http://orderservice:8080
    ports:
      - "5002:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - quickbite-net
    restart: unless-stopped

  orderservice:
    build:
      context: .
      dockerfile: Services/OrderService/OrderService.API/Dockerfile
    container_name: quickbite-orderservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__OrderDb: "Server=sqlserver,1433;Database=OrderDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: "${RABBITMQ_DEFAULT_USER}"
      RabbitMq__Password: "${RABBITMQ_DEFAULT_PASS}"
      JwtSettings__Issuer: "${JWT_ISSUER}"
      JwtSettings__Audience: "${JWT_AUDIENCE}"
      JwtSettings__SecretKey: "${JWT_SECRET}"
      Services__AuthService__Url: http://authservice:8080
      Services__CatalogService__Url: http://catalogservice:8080
    ports:
      - "5003:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      authservice:
        condition: service_started
      catalogservice:
        condition: service_started
    networks:
      - quickbite-net
    restart: unless-stopped

  adminservice:
    build:
      context: .
      dockerfile: Services/AdminService/AdminService.API/Dockerfile
    container_name: quickbite-adminservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=AdminServiceDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: "${RABBITMQ_DEFAULT_USER}"
      RabbitMq__Password: "${RABBITMQ_DEFAULT_PASS}"
      JwtSettings__Issuer: "${JWT_ISSUER}"
      JwtSettings__Audience: "${JWT_AUDIENCE}"
      JwtSettings__SecretKey: "${JWT_SECRET}"
    ports:
      - "5004:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - quickbite-net
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: Gateway/QuickBite.Gateway/Dockerfile
    container_name: quickbite-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      JwtSettings__Issuer: "${JWT_ISSUER}"
      JwtSettings__Audience: "${JWT_AUDIENCE}"
      JwtSettings__SecretKey: "${JWT_SECRET}"
    ports:
      - "5000:8080"
    depends_on:
      authservice:
        condition: service_started
      catalogservice:
        condition: service_started
      orderservice:
        condition: service_started
      adminservice:
        condition: service_started
    networks:
      - quickbite-net
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000
    container_name: quickbite-frontend
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_started
    networks:
      - quickbite-net
    restart: unless-stopped

  # One-time local seed runner (disabled by default).
  # Usage: docker compose --profile seed up --build db-seed
  db-seed:
    profiles: ["seed"]
    image: mcr.microsoft.com/mssql-tools
    container_name: quickbite-db-seed
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    volumes:
      # This path is intentionally inside docs/ because your repo ignores docs/ from git.
      - ./docs/local-seed/sql:/seed:ro
    networks:
      - quickbite-net
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "
      set -euo pipefail;
      for f in /seed/*.sql; do
        echo Running $$f;
        /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P \"$$MSSQL_SA_PASSWORD\" -b -i \"$$f\";
      done;
      echo Seed complete.
      "
